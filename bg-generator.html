<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>去背商品情境生成器 — 笙闆的AI工具箱</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f8f9fc;
            --surface: rgba(255, 255, 255, 0.72);
            --border: rgba(0, 0, 0, 0.06);
            --border-hover: rgba(0, 0, 0, 0.12);
            --text: #111827;
            --text-secondary: rgba(17, 24, 39, 0.55);
            --text-tertiary: rgba(17, 24, 39, 0.3);
            --radius: 20px;
            --radius-sm: 14px;
            --ease: cubic-bezier(0.22, 1, 0.36, 1);
            --blur: saturate(180%) blur(20px);
            --primary: #8b6cc1;
            --primary-hover: #7a5bb0;
            --primary-soft: rgba(139, 108, 193, 0.07);
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        body {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Ambient background with orbs */
        .ambient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: var(--bg);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: multiply;
            opacity: 0.4;
            filter: blur(60px);
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 108, 193, 0.5) 0%, transparent 70%);
            top: -150px;
            right: -100px;
            animation: float 20s infinite ease-in-out;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(218, 165, 32, 0.3) 0%, transparent 70%);
            bottom: -100px;
            left: -50px;
            animation: float 25s infinite ease-in-out reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(30px, -30px); }
            66% { transform: translate(-20px, 20px); }
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="noise"><feTurbulence baseFrequency="0.9" numOctaves="4" seed="2"/></filter><rect width="100" height="100" fill="rgba(0,0,0,0.02)" filter="url(%23noise)"/></svg>');
            background-size: 100px 100px;
        }

        .container {
            position: relative;
            z-index: 2;
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 24px;
            width: 100%;
        }

        /* Navigation */
        .nav {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 48px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 200ms var(--ease);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
        }

        .nav-link:hover {
            color: var(--text);
            background: var(--primary-soft);
        }

        .nav-link svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
        }

        /* Header */
        .header {
            margin-bottom: 48px;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.2;
            background: linear-gradient(135deg, var(--text) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 18px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* Demo Alert */
        #demoAlert {
            display: none;
            padding: 16px 20px;
            background: var(--primary-soft);
            border: 1px solid var(--primary);
            border-radius: var(--radius-sm);
            color: var(--primary);
            font-size: 14px;
            margin-bottom: 32px;
            backdrop-filter: var(--blur);
            font-weight: 500;
        }

        /* Main Grid */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 32px;
            }
        }

        /* Upload Zone */
        .upload-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        #uploadZone {
            padding: 48px;
            border: 2px dashed var(--border-hover);
            border-radius: var(--radius);
            background: var(--surface);
            backdrop-filter: var(--blur);
            cursor: pointer;
            transition: all 300ms var(--ease);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            min-height: 320px;
        }

        #uploadZone:hover {
            border-color: var(--primary);
            background: rgba(139, 108, 193, 0.05);
        }

        #uploadZone.dragover {
            border-color: var(--primary);
            background: rgba(139, 108, 193, 0.1);
            transform: scale(1.02);
        }

        #uploadZone svg {
            width: 48px;
            height: 48px;
            color: var(--text-secondary);
            transition: all 300ms var(--ease);
        }

        #uploadZone:hover svg {
            color: var(--primary);
        }

        #uploadZone p {
            font-size: 16px;
            font-weight: 500;
            color: var(--text);
            text-align: center;
        }

        #uploadZone span {
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
        }

        #fileInput {
            display: none;
        }

        /* Preview Area */
        #previewArea {
            position: relative;
            padding: 32px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            backdrop-filter: var(--blur);
            display: none;
            opacity: 0;
            transition: all 300ms var(--ease);
        }

        #previewArea.visible {
            display: block;
            opacity: 1;
        }

        #previewImg {
            width: 100%;
            height: auto;
            border-radius: var(--radius-sm);
            object-fit: contain;
            max-height: 400px;
        }

        #removeBtn {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 40px;
            height: 40px;
            background: rgba(17, 24, 39, 0.8);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 200ms var(--ease);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #removeBtn:hover {
            background: rgba(17, 24, 39, 0.95);
            transform: scale(1.1);
        }

        /* Presets Grid */
        .presets-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .presets-label {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        .presets-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        @media (max-width: 1200px) {
            .presets-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 768px) {
            .presets-grid {
                grid-template-columns: repeat(5, 1fr);
                gap: 10px;
            }
        }

        .preset-card {
            padding: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 200ms var(--ease);
            text-align: center;
            backdrop-filter: var(--blur);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .preset-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
            background: rgba(139, 108, 193, 0.05);
        }

        .preset-card.active {
            background: var(--primary-soft);
            border-color: var(--primary);
            box-shadow: 0 8px 24px rgba(139, 108, 193, 0.15);
        }

        .preset-emoji {
            font-size: 24px;
        }

        .preset-name {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            line-height: 1.3;
        }

        .preset-card.active .preset-name {
            color: var(--primary);
            font-weight: 600;
        }

        /* Custom Prompt */
        .custom-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .custom-label {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        #customPrompt {
            width: 100%;
            padding: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: var(--text);
            resize: vertical;
            min-height: 100px;
            transition: all 200ms var(--ease);
            backdrop-filter: var(--blur);
        }

        #customPrompt:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-soft);
        }

        #customPrompt::placeholder {
            color: var(--text-tertiary);
        }

        /* Generate Button */
        #generateBtn {
            padding: 16px 32px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 200ms var(--ease);
            box-shadow: 0 8px 24px rgba(139, 108, 193, 0.25);
        }

        #generateBtn:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(139, 108, 193, 0.35);
        }

        #generateBtn:active:not(:disabled) {
            transform: translateY(0);
        }

        #generateBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #generateBtn.loading {
            position: relative;
        }

        #generateBtn.loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            right: 12px;
            margin-top: -8px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 600ms linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Result Card */
        #resultCard {
            display: none;
            opacity: 0;
            transition: all 300ms var(--ease);
            margin-top: 40px;
        }

        #resultCard.visible {
            display: block;
            opacity: 1;
        }

        .result-wrapper {
            padding: 32px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            backdrop-filter: var(--blur);
        }

        .result-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 24px;
        }

        #resultImage {
            width: 100%;
            height: auto;
            border-radius: var(--radius-sm);
            margin-bottom: 24px;
            object-fit: contain;
            max-height: 500px;
            background: linear-gradient(135deg, rgba(139, 108, 193, 0.05) 0%, rgba(218, 165, 32, 0.05) 100%);
        }

        .result-actions {
            display: flex;
            gap: 12px;
        }

        #downloadBtn {
            flex: 1;
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 200ms var(--ease);
            box-shadow: 0 4px 12px rgba(139, 108, 193, 0.2);
        }

        #downloadBtn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(139, 108, 193, 0.3);
        }

        /* Footer */
        .footer {
            position: relative;
            z-index: 2;
            padding: 40px 24px;
            text-align: center;
            color: var(--text-tertiary);
            font-size: 13px;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 40px 16px;
            }

            .header h1 {
                font-size: 32px;
            }

            .header p {
                font-size: 16px;
            }

            .grid {
                gap: 24px;
            }

            #uploadZone {
                padding: 32px 24px;
                min-height: 280px;
            }

            #uploadZone svg {
                width: 36px;
                height: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="ambient">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>
    <div class="noise"></div>

    <div class="container">
        <nav class="nav">
            <a href="index.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                <span>回到工具箱</span>
            </a>
        </nav>

        <div class="header">
            <h1>去背商品情境生成器</h1>
            <p>上傳商品照片，AI 自動去背並生成精美情境圖</p>
        </div>

        <div id="demoAlert">
            ℹ 您目前在演示模式下。在 tools.reyway.com 上使用此工具可獲得完整功能。
        </div>

        <div class="grid">
            <!-- Left Column: Upload -->
            <div class="upload-section">
                <div id="uploadZone">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                        <circle cx="12" cy="13" r="4"></circle>
                    </svg>
                    <p>拖拽或點擊上傳圖片</p>
                    <span>支持 JPG, PNG, WebP • 最大 10MB</span>
                </div>
                <input type="file" id="fileInput" accept="image/*">

                <div id="previewArea">
                    <img id="previewImg" src="" alt="Preview">
                    <button id="removeBtn">×</button>
                </div>
            </div>

            <!-- Right Column: Presets & Settings -->
            <div class="presets-section">
                <div>
                    <div class="presets-label">預設風格</div>
                    <div class="presets-grid">
                        <div class="preset-card" data-preset="marble">
                            <span class="preset-emoji">🪨</span>
                            <span class="preset-name">大理石</span>
                        </div>
                        <div class="preset-card" data-preset="velvet">
                            <span class="preset-emoji">🎀</span>
                            <span class="preset-name">絲絨布幔</span>
                        </div>
                        <div class="preset-card" data-preset="metal">
                            <span class="preset-emoji">✨</span>
                            <span class="preset-name">金屬質感</span>
                        </div>
                        <div class="preset-card" data-preset="crystal">
                            <span class="preset-emoji">💎</span>
                            <span class="preset-name">水晶光影</span>
                        </div>
                        <div class="preset-card" data-preset="minimalist">
                            <span class="preset-emoji">⚪</span>
                            <span class="preset-name">極簡白</span>
                        </div>
                        <div class="preset-card" data-preset="wood">
                            <span class="preset-emoji">🪵</span>
                            <span class="preset-name">原木桌面</span>
                        </div>
                        <div class="preset-card" data-preset="plant">
                            <span class="preset-emoji">🌿</span>
                            <span class="preset-name">綠葉植物</span>
                        </div>
                        <div class="preset-card" data-preset="petals">
                            <span class="preset-emoji">🌸</span>
                            <span class="preset-name">花瓣散落</span>
                        </div>
                        <div class="preset-card" data-preset="cotton">
                            <span class="preset-emoji">🧵</span>
                            <span class="preset-name">棉麻布料</span>
                        </div>
                        <div class="preset-card" data-preset="sunlight">
                            <span class="preset-emoji">☀️</span>
                            <span class="preset-name">晨光窗台</span>
                        </div>
                    </div>
                </div>

                <div class="custom-section">
                    <label class="custom-label">自訂提示詞</label>
                    <textarea id="customPrompt" placeholder="或在此描述您想要的場景背景，例如：現代客廳，木地板，自然光，綠植..."></textarea>
                </div>

                <button id="generateBtn" disabled>生成情境圖</button>
            </div>
        </div>

        <!-- Result -->
        <div id="resultCard">
            <div class="result-wrapper">
                <div class="result-title">✨ 生成完成</div>
                <img id="resultImage" src="" alt="Result">
                <div class="result-actions">
                    <button id="downloadBtn">下載結果</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        笙闆的 AI 工具箱 · Powered by REYWAY
    </footer>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const previewArea = document.getElementById('previewArea');
        const previewImg = document.getElementById('previewImg');
        const removeBtn = document.getElementById('removeBtn');
        const generateBtn = document.getElementById('generateBtn');
        const resultCard = document.getElementById('resultCard');
        const resultImage = document.getElementById('resultImage');
        const downloadBtn = document.getElementById('downloadBtn');
        const customPrompt = document.getElementById('customPrompt');
        const demoAlert = document.getElementById('demoAlert');
        const presetCards = document.querySelectorAll('.preset-card');

        let selectedFile = null;
        let selectedPreset = null;
        let resultImageData = null;

        const isDemoMode = !window.location.hostname.includes('tools.reyway.com');
        if (isDemoMode) { demoAlert.style.display = 'block'; }

        uploadZone.addEventListener('click', () => fileInput.click());
        uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
        uploadZone.addEventListener('dragleave', () => { uploadZone.classList.remove('dragover'); });
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault(); uploadZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) handleFileSelect(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => { if (e.target.files.length > 0) handleFileSelect(e.target.files[0]); });

        function handleFileSelect(file) {
            if (!file.type.startsWith('image/')) { alert('請選擇圖片檔案'); return; }
            if (file.size > 10 * 1024 * 1024) { alert('檔案過大，請選擇小於 10MB 的圖片'); return; }
            selectedFile = file;
            uploadZone.style.display = 'none';
            const reader = new FileReader();
            reader.onload = (e) => { previewImg.src = e.target.result; previewArea.classList.add('visible'); generateBtn.disabled = false; };
            reader.readAsDataURL(file);
        }

        removeBtn.addEventListener('click', () => {
            selectedFile = null; selectedPreset = null;
            previewArea.classList.remove('visible'); uploadZone.style.display = 'block';
            generateBtn.disabled = true; customPrompt.value = '';
            resultCard.classList.remove('visible');
            presetCards.forEach(card => card.classList.remove('active'));
            fileInput.value = '';
        });

        presetCards.forEach(card => {
            card.addEventListener('click', () => {
                presetCards.forEach(c => c.classList.remove('active'));
                card.classList.add('active'); selectedPreset = card.dataset.preset; customPrompt.value = '';
            });
        });

        customPrompt.addEventListener('input', () => {
            if (customPrompt.value.trim()) { presetCards.forEach(card => card.classList.remove('active')); selectedPreset = null; }
        });

        generateBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            const background = selectedPreset || customPrompt.value.trim() || 'white';
            generateBtn.classList.add('loading'); generateBtn.disabled = true;
            try {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const base64 = e.target.result.split(',')[1];
                    const mimeType = selectedFile.type;
                    if (isDemoMode) { showDemoResult(); }
                    else {
                        try {
                            const response = await fetch('/api/bg-generator', {
                                method:'POST', headers:{'Content-Type':'application/json'},
                                body:JSON.stringify({image:base64,mimeType,backgroundStyle:background,customPrompt:selectedPreset?'':customPrompt.value.trim()})
                            });
                            if (!response.ok) throw new Error('API error: '+response.status);
                            const data = await response.json();
                            resultImageData = data.image;
                            resultImage.src = 'data:'+data.mimeType+';base64,'+data.image;
                            resultCard.classList.add('visible');
                        } catch(error) { console.error('Generation error:',error); alert('生成失敗，請稍後重試'); showDemoResult(); }
                    }
                };
                reader.readAsDataURL(selectedFile);
            } finally { generateBtn.classList.remove('loading'); generateBtn.disabled = false; }
        });

        function showDemoResult() {
            const canvas = document.createElement('canvas'); canvas.width=400; canvas.height=400;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createLinearGradient(0,0,400,400);
            gradient.addColorStop(0,'#8b6cc1'); gradient.addColorStop(1,'#a88dd6');
            ctx.fillStyle = gradient; ctx.fillRect(0,0,400,400);
            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 24px "Noto Sans TC"'; ctx.textAlign = 'center';
            ctx.fillText('示範結果',200,180); ctx.font = '16px "Noto Sans TC"';
            ctx.fillText('這是生成圖片的預覽',200,220); ctx.fillText('實際功能需在完整環境中使用',200,250);
            const dataUrl = canvas.toDataURL('image/png');
            resultImageData = dataUrl.split(',')[1]; resultImage.src = dataUrl; resultCard.classList.add('visible');
        }

        downloadBtn.addEventListener('click', () => {
            if (!resultImage.src) return;
            const link = document.createElement('a'); link.href = resultImage.src;
            link.download = 'bg-generator-'+Date.now()+'.png';
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        });
    </script>
</body>
</html>
